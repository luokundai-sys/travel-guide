<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>行囊 · 家庭旅游攻略</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="app-bar">
    <div class="logo">行<span>囊</span></div>
    <div class="spacer"></div>
    <div class="sync" id="syncStatus"></div>
  </header>

  <div class="banner" id="setupBanner" style="display:none">
    还没配好 —— 检查 <b>config.js</b> 的 Supabase / 高德 key。<span id="setupMsg"></span>
  </div>

  <main>
    <!-- 规划 -->
    <section class="card">
      <h2>① 选城市</h2>
      <div class="plan-row">
        <input class="search" id="cityInput" placeholder="输入城市，如 成都、西安、大理…" />
        <button class="btn primary" id="searchBtn">搜景点美食</button>
      </div>
      <div class="presets" id="presets"></div>
    </section>

    <section class="card" id="pickCard" style="display:none">
      <h2>② 勾选想去的（景点 + 美食）</h2>
      <div id="loading" class="empty" style="display:none">正在拉取…</div>
      <div class="pick-cols">
        <div>
          <div class="col-title">🏛 景点</div>
          <div id="attrList" class="check-list"></div>
        </div>
        <div>
          <div class="col-title">🍜 美食</div>
          <div id="foodList" class="check-list"></div>
        </div>
      </div>
      <div class="plan-row gen-row">
        <label>分几天</label>
        <input class="num" id="daysInput" type="number" min="1" max="15" value="3" />
        <input class="search" id="tripName" placeholder="行程名（如：十一成都行）" />
        <button class="btn primary" id="genBtn">③ 生成最优路线</button>
      </div>
    </section>

    <section class="card" id="routeCard" style="display:none">
      <h2>④ 推荐路线</h2>
      <div id="mapBox" class="map-box"></div>
      <div id="routeList"></div>
      <button class="btn primary" id="saveBtn">存为家庭行程（全家可见）</button>
    </section>

    <!-- 共享行程 -->
    <section class="card">
      <h2>家庭行程 · 共享</h2>
      <div class="plan-row">
        <select class="trip-select" id="savedSelect"></select>
        <button class="btn" id="delSaved">删除</button>
      </div>
      <div id="savedDays" class="days-wrap"></div>
    </section>
  </main>

  <script src="config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="db.js"></script>
  <script src="app.js"></script>
</body>
</html>
